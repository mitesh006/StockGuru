<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - StockGuru</title>
    <meta name="description" content="Real-time stock market dashboard with live prices, indices, and trending stocks.">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="icon" href="favicon.ico">
</head>

<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <a href="dashboard.html" class="logo">StockGuru</a>
            <ul class="nav-links" id="nav-links">
                <li><a href="dashboard.html" class="active">Dashboard</a></li>
                <li><a href="watchlist.html">Watchlist</a></li>
                <li><a href="about.html">About</a></li>
                <li id="nav-auth"><a href="login.html">Login</a></li>
            </ul>
        </div>
    </nav>

    <!-- ═══ TICKER BAR ═══ -->
    <div class="ticker-bar" id="ticker-bar">
        <div class="ticker-track" id="ticker-track">
            <div class="ticker-loading">Loading market data…</div>
        </div>
    </div>

    <div class="container">

        <!-- ═══ HERO / SEARCH ═══ -->
        <div class="dash-hero">
            <div class="page-header">
                <h1>Market Dashboard</h1>
                <p>Real-time stock analysis and market insights</p>
            </div>
            <div class="search-section">
                <div class="search-container" id="search-wrapper">
                    <input type="text" id="stock-search-input" class="search-input"
                        placeholder="Search by symbol or company (e.g., AAPL, Tesla)…">
                    <button id="search-btn" class="btn">Search</button>
                </div>
            </div>
        </div>

        <!-- ═══ MARKET OVERVIEW ═══ -->
        <div class="dash-section" id="overview-section">
            <div class="dash-section-title">Market Overview</div>
            <div class="overview-grid" id="overview-grid">
                <div class="overview-skeleton"></div>
                <div class="overview-skeleton"></div>
                <div class="overview-skeleton"></div>
            </div>
        </div>

        <!-- ═══ TRENDING STOCKS ═══ -->
        <div class="dash-section" id="trending-section">
            <div class="dash-section-title">Trending Stocks</div>
            <div class="trending-grid" id="trending-grid">
                <div class="trending-skeleton"></div>
                <div class="trending-skeleton"></div>
                <div class="trending-skeleton"></div>
                <div class="trending-skeleton"></div>
                <div class="trending-skeleton"></div>
                <div class="trending-skeleton"></div>
            </div>
        </div>

        <!-- ═══ CHART SECTION ═══ -->
        <div class="chart-section">
            <div class="chart-header">
                <h2 class="chart-title" id="chart-stock-title">Chart Unavailable</h2>
                <div class="chart-controls">
                    <button class="active" data-period="1D">1D</button>
                    <button data-period="1W">1W</button>
                    <button data-period="1M">1M</button>
                    <button data-period="3M">3M</button>
                    <button data-period="1Y">1Y</button>
                    <button data-period="5Y">5Y</button>
                </div>
            </div>
            <div id="stock-chart" class="chart-area">
                <canvas id="priceChart"></canvas>
                <div class="chart-loader" id="chart-loader" style="display: none;">
                    <div class="spinner-small"></div>
                    <div>Loading chart data…</div>
                </div>
                <div class="chart-error" id="chart-error" style="display: none;">
                    <div class="error-icon">!</div>
                    <div id="chart-error-msg">Chart unavailable</div>
                </div>
                <div class="chart-placeholder-inner" id="chart-placeholder-inner">
                    <div style="font-size:3rem;opacity:0.2;"></div>
                    <div style="opacity:0.45;margin-top:0.5rem;">Click a stock card above to load its chart</div>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/dashboard.js"></script>
</body>

</html>
