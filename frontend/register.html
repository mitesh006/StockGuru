<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - StockGuru</title>
    <meta name="description" content="Create your StockGuru account and start tracking stocks.">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="icon" href="favicon.ico">
</head>
<body class="auth-page">

    <div class="auth-layout">

        <!-- Left Panel: Branding -->
        <div class="auth-panel-left">
            <div class="auth-panel-inner">
                <a href="dashboard.html" class="auth-brand">StockGuru</a>
                <p class="auth-brand-sub">Your intelligent market companion</p>
                <div class="auth-features">
                    <div class="auth-feature-item">
                        <span class="auth-feature-dot"></span>
                        Real-time stock prices &amp; charts
                    </div>
                    <div class="auth-feature-item">
                        <span class="auth-feature-dot"></span>
                        Detailed fundamental analysis
                    </div>
                    <div class="auth-feature-item">
                        <span class="auth-feature-dot"></span>
                        Personal watchlist &amp; portfolio
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Panel: Form -->
        <div class="auth-panel-right">
            <div class="auth-card">

                <div class="auth-card-header">
                    <h2 class="auth-title">Create Account</h2>
                    <p class="auth-subtitle">Start tracking stocks and building your portfolio</p>
                </div>

                <div id="error-msg"   class="error-msg"></div>
                <div id="success-msg" class="success-msg"></div>

                <form id="register-form" novalidate>
                    <div class="form-group">
                        <label class="form-label" for="fullname">Full Name</label>
                        <input type="text" id="fullname" class="form-input"
                            placeholder="Full Name" required autocomplete="name">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="email">Email Address</label>
                        <input type="email" id="email" class="form-input"
                            placeholder="you@example.com" required autocomplete="email">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" class="form-input"
                                placeholder="Min. 6 characters" required autocomplete="new-password">
                            <button type="button" class="toggle-password" id="toggle-pwd"
                                aria-label="Toggle password visibility">
                                <span class="eye-icon" id="eye-icon"></span>
                            </button>
                        </div>
                        <div class="password-strength">
                            <div class="strength-bar" id="strength-bar"></div>
                        </div>
                        <div class="strength-text" id="strength-text"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="confirm-password">Confirm Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="confirm-password" class="form-input"
                                placeholder="Repeat your password" required autocomplete="new-password">
                            <button type="button" class="toggle-password" id="toggle-pwd2"
                                aria-label="Toggle confirm password">
                                <span class="eye-icon" id="eye-icon2"></span>
                            </button>
                        </div>
                    </div>

                    <label class="terms-check">
                        <input type="checkbox" id="terms" required>
                        I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                    </label>

                    <button type="submit" class="btn-auth" id="register-btn">Create Account</button>
                </form>

                <div class="auth-divider"><span>or</span></div>

                <a href="dashboard.html" class="btn-guest">Continue as Guest</a>

                <div class="auth-switch">
                    Already have an account? <a href="login.html">Sign in</a>
                </div>

            </div>
        </div>

    </div>

    <script src="js/register.js"></script>
</body>
</html>
